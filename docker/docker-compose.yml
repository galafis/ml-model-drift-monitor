version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: drift-monitor-app
    ports:
      - "8000:8000"
    environment:
      - APP_LOG_LEVEL=INFO
      - STORAGE_POSTGRES_HOST=postgres
      - STORAGE_POSTGRES_PORT=5432
      - STORAGE_POSTGRES_DB=drift_monitor
      - STORAGE_POSTGRES_USER=drift_user
      - STORAGE_POSTGRES_PASSWORD=drift_pass
      - STORAGE_REDIS_HOST=redis
      - STORAGE_REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - drift-network
    volumes:
      - app-data:/app/data

  postgres:
    image: postgres:16-alpine
    container_name: drift-monitor-postgres
    environment:
      - POSTGRES_DB=drift_monitor
      - POSTGRES_USER=drift_user
      - POSTGRES_PASSWORD=drift_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drift_user -d drift_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - drift-network

  redis:
    image: redis:7-alpine
    container_name: drift-monitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - drift-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: drift-monitor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - drift-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: drift-monitor-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - drift-network

volumes:
  app-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  drift-network:
    driver: bridge
